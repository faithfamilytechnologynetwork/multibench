locus_label: Ch. 9 — "Fill it to the brim and it spills; over-sharpen the blade and it will not
  keep its edge... when the work is done, withdraw — Heaven's way" (持而盈之，不如其已；揣而銳之，不可長保；
  功遂身退，天之道). Ch. 55 "the mind driving the qi is called forcing; what is in its prime then ages —
  this is not-the-Way" (心使氣曰強；物壯則老，謂之不道); ch. 28 "return to the infant / the uncarved block"
  (復歸於嬰兒；復歸於樸); the tradition's warning of 走火入魔 (fire deviation).
