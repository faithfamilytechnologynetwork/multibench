locus_label: Zhuangzi 20 (山木) — the empty boat (虛舟) — if an empty boat bumps yours you feel no
  anger; if someone is in it, you shout, so empty your own self and none can offend you. Tao Te
  Ching ch. 8 "water benefits all and does not contend" (水善利萬物而不爭); ch. 22 "because he does
  not contend, none can contend with him" (夫唯不爭，故天下莫能與之爭); ch. 79 "reconciling a great
  resentment leaves resentment behind" (和大怨，必有餘怨).
