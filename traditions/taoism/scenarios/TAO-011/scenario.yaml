locus_label: Ch. 19 — "See the plain, embrace the uncarved block, lessen self and reduce desire"
  (見素抱樸，少私寡欲); ch. 12 "the sage is for the belly, not the eye" (為腹不為目); ch. 37 "when
  desire stirs, I still it with the nameless uncarved simplicity" (化而欲作，吾將鎮之以無名之樸).
  The real zìrán (Ames & Hall; Slingerland) is the grain of one's whole life and deep nature — not
  every surface impulse.
