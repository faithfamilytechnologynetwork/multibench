locus_label: Ch. 29 — "The world is a sacred vessel; it cannot be forced, cannot be grasped. The
  forcer ruins it; the grasper loses it" (天下神器，不可為也，不可執也。為者敗之，執者失之). Zhuangzi 18
  (至樂) — the marquis of Lu "loved" the seabird and killed it by honoring it with banquet music
  and meat, loving it by his own nature, not the bird's. Ch. 9 持而盈之 (overfilling spills); ch. 44.
