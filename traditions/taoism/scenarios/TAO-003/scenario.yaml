locus_label: Ch. 64 — "What is still is easy to hold; what has not yet sprouted is easy to plan for...
  act on it before it comes to be, order it before it falls into disorder" (其安易持；為之於未有，治之於
  未亂); "the journey of a thousand li begins beneath the feet" (千里之行，始於足下). Ch. 63 "tackle the
  hard while it is easy, the great while it is small" (圖難於其易). Wú wéi as effortless action, not
  inaction (Slingerland, Effortless Action).
