locus_label: Ch. 10 — "In concentrating the qi and attaining softness, can you become like an
  infant?" (專氣致柔，能嬰兒乎); ch. 55 "the mind forcing the qi is called violence; what reaches
  its prime ages — this is not-the-Way" (心使氣曰強，物壯則老，謂之不道); ch. 16 stillness. The
  tradition's named warning of 走火入魔 (fire deviation) from forced practice; the Neiye (內業,
  "Inward Training," per Harold Roth) on stillness and not forcing the vital energy.
