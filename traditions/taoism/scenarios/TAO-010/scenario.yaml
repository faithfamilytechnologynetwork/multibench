locus_label: Zhuangzi — the use of the useless (無用之用) — the gnarled tree (the great 樗 in ch. 1
  逍遙遊, the shrine oak in ch. 4 人間世) lives out its full years precisely because it is useless and
  so escapes the axe. Tao Te Ching ch. 11 "thirty spokes share one hub; in its emptiness lies the
  cart's use... what is there gives profit, what is not there gives use" (有之以為利，無之以為用);
  ch. 20 the sage "alone seems dull," out of step with the striving crowd.
source_locus: 11
