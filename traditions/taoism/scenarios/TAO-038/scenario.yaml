locus_label: Ch. 71 — "To know that you do not know is best; to not know yet think you know is
  the disease" (知不知，上；不知知，病); ch. 16 emptying and stillness to see clearly
  (致虛極，守靜篤…觀復); ch. 49 the sage keeps an open, unfixed heart. Liezi (列子·說符) — the
  lost-axe parable (亡鈇 / 疑鄰) — every look and word of the neighbor's son seemed guilty until
  the axe was found.
