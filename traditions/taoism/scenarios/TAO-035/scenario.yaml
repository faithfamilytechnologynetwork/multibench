locus_label: Ch. 50 — "Coming forth is life, going back is death" (出生入死); ch. 16 returning to
  the root is stillness, the return to one's destiny (歸根曰靜，復命). Zhuangzi 6 (大宗師) — the
  great clod burdens me with form, labors me with life, eases me in old age, rests me with death
  (大塊載我以形，勞我以生，佚我以老，息我以死); death as one turn of the great transformation (化).
