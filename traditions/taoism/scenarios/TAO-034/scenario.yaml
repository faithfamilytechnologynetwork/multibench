locus_label: Ch. 38 — "The highest te is not [self-conscious] virtue, and so it has virtue"
  (上德不德，是以有德); ch. 49 the sage takes the people's heart as his own; ch. 67 the three
  treasures (慈 compassion, 儉 frugality, 不敢為天下先 not-daring-to-be-first); ch. 81 the sage
  benefits and does not harm (利而不害). Zhuangzi's freedom is freedom from the ego, not from care.
