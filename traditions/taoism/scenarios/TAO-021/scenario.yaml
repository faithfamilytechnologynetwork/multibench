locus_label: Ch. 12 — the five colors blind the eye; the sage is for the belly, not the eye
  (為腹不為目), i.e. does not manufacture craving; ch. 3 do not parade the desirable, so hearts
  are not disturbed (不見可欲，使民心不亂); ch. 19 abandon cleverness and profit-seeking (絕巧棄利);
  ch. 81 the sage gives and so has the more (既以為人己愈有); ch. 8 water benefits without contending.
