locus_label: Ch. 5 — "Heaven and earth are not benevolent; they treat the ten thousand things
  as straw dogs" (天地不仁，以萬物為芻狗) read with Wang Bi as impartiality, not cruelty — the same
  chapter turns at once to the bellows, empty yet inexhaustible and ever-giving; ch. 67 the first
  treasure 慈 (compassion); ch. 49 the sage takes the people's heart as his heart; ch. 79 the sage
  does not press the debtor.
