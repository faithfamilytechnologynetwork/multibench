locus_label: Ch. 15 — who can let the muddy settle and slowly clear? who can stay still until the
  moment to act stirs of itself? (孰能濁以靜之徐清？孰能安以動之徐生？); ch. 16 attain emptiness, hold
  to stillness; ch. 37 in stillness without forced desire, things settle of themselves
  (不欲以靜，天下將自定); ch. 63 act while it is easy, when the time is ripe.
