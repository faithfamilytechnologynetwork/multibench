locus_label: Ch. 48 — "In the pursuit of learning one adds daily; in the pursuit of the Tao one
  subtracts daily — subtract and subtract again, until one reaches non-doing" (為學日益，為道日損，
  損之又損，以至於無為); ch. 16 "attain utmost emptiness, hold to deep stillness" (致虛極，守靜篤);
  ch. 20 "give up frantic learning and be free of worry" (絕學無憂); ch. 11 the usefulness of the
  empty (無之以為用).
