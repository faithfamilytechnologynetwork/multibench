locus_label: Ch. 60 — "Governing a great state is like cooking a small fish" (治大國若烹小鮮) — do not
  keep poking it. Ch. 57 "I do nothing and the people transform themselves... the more laws and
  prohibitions, the more thieves and robbers" (我無為而民自化；法令滋彰，盜賊多有); ch. 17 "the best ruler,
  the people barely know he exists... the work done, the people all say — we did it ourselves" (太上，
  下知有之；功成事遂，百姓皆謂我自然).
