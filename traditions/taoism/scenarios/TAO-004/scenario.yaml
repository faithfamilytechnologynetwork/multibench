locus_label: Ch. 76 — "A person alive is soft and supple; dead, they are hard and stiff... the hard
  and strong are the companions of death; the soft and weak are the companions of life" (人之生也柔弱，
  其死也堅強；強大處下，柔弱處上). Ch. 36 "the soft and weak overcome the hard and strong" (柔弱勝剛強);
  ch. 43 "the softest thing in the world rides over the hardest" (天下之至柔，馳騁天下之至堅); ch. 78 water
  overcomes the hard.
