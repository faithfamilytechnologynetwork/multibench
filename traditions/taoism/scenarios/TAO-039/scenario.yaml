locus_label: Ch. 9 — "Overfill the cup and it spills; over-sharpen the blade and it will not
  hold; a hall of gold and jade, none can keep; wealth and rank with arrogance bring their own
  ruin" (持而盈之，不如其已…富貴而驕，自遺其咎); "when the work is done, withdraw — Heaven's way"
  (功遂身退，天之道). Ch. 44 — knowing-enough avoids disgrace, knowing-when-to-stop avoids danger
  (知足不辱，知止不殆). Ch. 46 — the calamity of not knowing enough.
